<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Float Layout</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#f2f2f2;
      padding:30px;
    }

    .container{
      width:900px;
      margin:auto;
      background:white;
      border:1px solid #ccc;
    }

    /* HEADER */
    .header{
      background:#555;
      color:white;
      text-align:center;
      padding:20px;
      font-weight:bold;
    }

    /* SIDEBAR */
    .sidebar{
      width:15%;
      height:400px;
      background:#eee;
      float:left;
      padding:10px;
      font-weight:bold;
    }

    /* MAIN CONTENT */
    .main{
      width:85%;
      float:left;
    }

    .content-a,
    .content-b,
    .content-c,
    .content-d{
      width:50%;
      height:120px;
      float:left;
      padding:20px;
      font-weight:bold;
    }

    .content-a{
      background:#4f86e8;
      color:#111;
    }

    .content-b{
      background:#089db0;
      color:#111;
    }

    .content-c{
      background:#ccc;
      color:#111;
    }

    .content-d{
      background:orange;
      color:#111;
    }

    /* JUMBOTRON */
    .jumbotron{
      clear:both;
      background:#f5f5f5;
      padding:20px;
      font-weight:bold;
    }

    /* FOOTER */
    .footer{
      clear:both;
      background:#3f7f8a;
      color:black;
      padding:20px;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="header">
      Header
    </div>

    <div class="sidebar">
      sidebar
    </div>

    <div class="main">

      <div class="content-a">
        Content A
      </div>

      <div class="content-b">
        Content B
      </div>

      <div class="jumbotron">
        jumbotron
      </div>

      <div class="content-c">
        Content C
      </div>

      <div class="content-d">
        Content D
      </div>

    </div>

    <div class="footer">
      Footer
    </div>

  </div>

</body>
</html>
