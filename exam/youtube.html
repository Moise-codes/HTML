<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Style Skeleton UI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f9f9f9;
      color: #111;
    }

    /* TOP BAR */
    .topbar {
      height: 64px;
      background: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      border-bottom: 1px solid #e5e5e5;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .left,
    .center,
    .right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: #ff0000;
    }

    .search {
      width: 420px;
      height: 36px;
      border-radius: 18px;
      background: #e9e9e9;
    }

    .icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ddd;
    }

    /* LAYOUT */
    .container {
      display: grid;
      grid-template-columns: 240px 1fr;
      height: calc(100vh - 64px);
    }

    /* SIDEBAR */
    .sidebar {
      background: white;
      border-right: 1px solid #eee;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .nav-item {
      width: 100%;
      height: 18px;
      border-radius: 6px;
      background: #e6e6e6;
    }

    /* MAIN CONTENT */
    .main {
      padding: 20px;
      overflow-y: auto;
    }

    /* SKELETON */
    .skeleton {
      position: relative;
      overflow: hidden;
      background: #e6e6e6;
      border-radius: 10px;
    }

    .skeleton::before {
      content: "";
      position: absolute;
      top: 0;
      left: -150px;
      width: 120px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
      animation: shimmer 1.2s infinite;
    }

    @keyframes shimmer {
      100% {
        left: 100%;
      }
    }

    /* VIDEO GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
    }

    .video-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .thumbnail {
      width: 100%;
      height: 150px;
      border-radius: 14px;
    }

    .title {
      width: 80%;
      height: 16px;
    }

    .meta {
      width: 60%;
      height: 14px;
    }

    /* WATCH PAGE MOCK */
    .watch-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-top: 40px;
    }

    .video-player {
      width: 100%;
      height: 420px;
      border-radius: 16px;
    }

    .side-video {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .mini-thumb {
      width: 100%;
      height: 90px;
      border-radius: 12px;
    }

    .mini-title {
      width: 70%;
      height: 14px;
    }

    @media (max-width: 900px) {
      .container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .search {
        width: 200px;
      }

      .watch-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="left">
      <div class="icon skeleton"></div>
      <div class="logo"></div>
    </div>

    <div class="center">
      <div class="search skeleton"></div>
    </div>

    <div class="right">
      <div class="icon skeleton"></div>
      <div class="icon skeleton"></div>
      <div class="icon skeleton"></div>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="nav-item skeleton"></div>
      <div class="nav-item skeleton"></div>
      <div class="nav-item skeleton"></div>
      <div class="nav-item skeleton"></div>
      <div class="nav-item skeleton"></div>
      <div class="nav-item skeleton"></div>
      <div class="nav-item skeleton"></div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

      <div class="grid">
        <div class="video-card">
          <div class="thumbnail skeleton"></div>
          <div class="title skeleton"></div>
          <div class="meta skeleton"></div>
        </div>

        <div class="video-card">
          <div class="thumbnail skeleton"></div>
          <div class="title skeleton"></div>
          <div class="meta skeleton"></div>
        </div>

        <div class="video-card">
          <div class="thumbnail skeleton"></div>
          <div class="title skeleton"></div>
          <div class="meta skeleton"></div>
        </div>

        <div class="video-card">
          <div class="thumbnail skeleton"></div>
          <div class="title skeleton"></div>
          <div class="meta skeleton"></div>
        </div>

        <div class="video-card">
          <div class="thumbnail skeleton"></div>
          <div class="title skeleton"></div>
          <div class="meta skeleton"></div>
        </div>

        <div class="video-card">
          <div class="thumbnail skeleton"></div>
          <div class="title skeleton"></div>
          <div class="meta skeleton"></div>
        </div>
      </div>

      <!-- WATCH PAGE PREVIEW -->
      <div class="watch-layout">
        <div>
          <div class="video-player skeleton"></div>
          <div class="title skeleton" style="margin-top: 16px;"></div>
          <div class="meta skeleton" style="margin-top: 10px;"></div>
        </div>

        <div class="side-video">
          <div class="mini-thumb skeleton"></div>
          <div class="mini-title skeleton"></div>

          <div class="mini-thumb skeleton"></div>
          <div class="mini-title skeleton"></div>

          <div class="mini-thumb skeleton"></div>
          <div class="mini-title skeleton"></div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
