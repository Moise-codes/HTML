<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Form</title>
    <style>
        /* Global Styles */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #e5e7eb; /* Light grey background from image */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Card Container */
        .signup-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 28px;
            color: #111;
            font-weight: 700;
        }

        /* Form Grouping */
        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }

        /* Input Styling */
        input {
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #888;
        }

        /* Password field wrapper for the eye icon */
        .password-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-wrapper input {
            width: 100%;
            padding-right: 40px;
        }

        .eye-icon {
            position: absolute;
            right: 12px;
            cursor: pointer;
            color: #888;
            width: 20px;
            height: 20px;
        }

        /* Primary Button */
        .btn-signup {
            width: 100%;
            padding: 14px;
            background-color: #1a2130; /* Dark navy/black */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 15px;
            transition: background-color 0.2s;
        }

        .btn-signup:hover {
            background-color: #2a3245;
        }

        /* Google Button */
        .btn-google {
            width: 100%;
            padding: 12px;
            background-color: white;
            color: #555;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 25px;
        }

        .btn-google:hover {
            background-color: #f9f9f9;
        }

        /* Footer Text */
        .footer-text {
            text-align: center;
            font-size: 14px;
            color: #666;
        }

        .footer-text a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-text a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="signup-card">
        <h2>Sign Up</h2>
        
        <form>
            <div class="form-group">
                <label>Username</label>
                <input type="text" placeholder="Enter your username">
            </div>

            <div class="form-group">
                <label>Email address</label>
                <input type="email" placeholder="Enter your email address">
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" placeholder="Enter your password">
                    <!-- Eye Icon SVG -->
                    <svg class="eye-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                    </svg>
                </div>
            </div>

            <button type="submit" class="btn-signup">Sign Up</button>
        </form>

        <button class="btn-google">
            <!-- Google Logo SVG -->
            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                <path d="M17.64 9.2c0-.63-.08-1.15-.24-1.66H9v3.34h4.84c-.21 1.12-1.06 2.04-2.22 2.64v3.52h3.62c2.13-1.96 3.37-4.85 3.37-8.3z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.47-0.81 5.95-2.18l-3.62-3.52c-0.54 0.54-1.24 0.86-2.33 0.86-1.79 0-3.3-1.21-3.84-2.84h-3.74v3.42C3.42 14.78 6.21 18 9 18z" fill="#34A853"/>
                <path d="M5.16 10.53c-0.21-0.62-0.33-1.27-0.33-1.93s0.12-1.31 0.33-1.93V4.86H2.33C1.31 6.31 0.5 8.05 0.5 10s0.81 3.69 2.33 5.14l2.83-3.52z" fill="#FBBC05"/>
                <path d="M9 4.78c1.21 0 2.32 0.42 3.21 1.26l2.43-2.43C13.47 2.81 11.43 2 9 2 6.21 2 3.42 5.22 3.42 8l2.83 3.52c0.54-0.63 1.24-1.26 2.33-1.84z" fill="#EA4335"/>
            </svg>
            Sign Up with Google
        </button>

        <div class="footer-text">
            Already registered? <a href="#">Sign In</a>
        </div>
    </div>

</body>
</html>
